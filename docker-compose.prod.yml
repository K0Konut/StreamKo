services:
  streamko-web:
    container_name: streamko-web
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    networks:
      - npm

  streamko-api:
    container_name: streamko-api
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: /opt/app/.tmp/data.db
    volumes:
      - ${STREAMKO_API_DATA_PATH:-streamko_api_data}:/opt/app/.tmp
      - ${STREAMKO_API_UPLOADS_PATH:?Set STREAMKO_API_UPLOADS_PATH to a mounted HDD path}:/opt/app/public/uploads
    restart: unless-stopped
    networks:
      - npm

volumes:
  streamko_api_data:

networks:
  npm:
    external: true
